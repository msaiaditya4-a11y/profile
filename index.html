<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather App</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

<div class="weather-card">

<h1>

<i class="fa-solid fa-cloud-sun"></i>

Weather App

</h1>

<div class="search-box">

<input
type="text"
id="city"
placeholder="Enter City Name">

<button id="searchBtn">

<i class="fa-solid fa-magnifying-glass"></i>

</button>

</div>

<div class="weather">

<img
id="weatherIcon"
src=""
alt="Weather Icon">

<h2 id="temperature">--°C</h2>

<h3 id="cityName">City Name</h3>

<p id="description">

Weather Description

</p>

<div class="details">

<div class="box">

<i class="fa-solid fa-temperature-half"></i>

<h4>Feels Like</h4>

<p id="feelsLike">--°C</p>

</div>

<div class="box">

<i class="fa-solid fa-droplet"></i>

<h4>Humidity</h4>

<p id="humidity">--%</p>

</div>

<div class="box">

<i class="fa-solid fa-wind"></i>

<h4>Wind</h4>

<p id="wind">-- km/h</p>

</div>

<div class="box">

<i class="fa-solid fa-gauge-high"></i>

<h4>Pressure</h4>

<p id="pressure">-- hPa</p>

</div>

<div class="box">

<i class="fa-solid fa-flag"></i>

<h4>Country</h4>

<p id="country">--</p>

</div>

<div class="box">

<i class="fa-solid fa-sun"></i>

<h4>Sunrise</h4>

<p id="sunrise">--</p>

</div>

<div class="box">

<i class="fa-solid fa-moon"></i>

<h4>Sunset</h4>

<p id="sunset">--</p>

</div>

</div>

</div>

<div id="error" class="error">

City not found.

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
